[network]
udp_echo_port = 28080
mtu = 1500

[features]
trace_enabled = true
afxdp_redirect = false
udp_echo_enabled = true
forwarding_enabled = false
nat_enabled = false
mirror_enabled = false
debug_enabled = false

[tracing]
mirror_sample_rate = 100
log_flags = 1  # 日志标志位（0=关闭所有日志，1=DEBUG_PKG, 2=UDPECHO, 4=SNAT, 8=DNAT, 255=ALL）

# 抓包规则配置
# 支持多条规则，只要匹配任一规则就会抓包
# 如果没有任何规则，则抓取所有数据包

[[capture_rules]]
name = "udp echo input"
src_port = 28080
protocol = "udp"

[[capture_rules]]
name = "udp echo output"
dst_port = 28080
protocol = "udp"

[[capture_rules]]                                                                                                                                                                                                          
name = "all icmp"                                                                                                                                                                                                          
protocol = "icmp"   

# NAT 配置
[nat]
vpn_server_ip = "192.168.1.1"      # VPN 服务器 IP
vpn_port = 18080               # VPN 端口
port_start = 10000             # 端口范围起始
port_end = 65535               # 端口范围结束
reserved_ports = [18080, 28080, 22, 80, 443, 3389]  # 预留端口
timeout = 60                    # 超时时间（秒）

# 网卡映射配置
ingress_iface = 0      # 入口网卡 eth0
egress_iface = 2       # 出口网卡 eth2

# 出口网卡的公网 IP 列表
egress_ips = [
    "192.168.56.103",    # eth2 的第1个公网 IP
    "192.168.56.104",    # eth2 的第2个公网 IP
]


